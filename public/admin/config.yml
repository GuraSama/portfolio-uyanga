backend:
  name: git-gateway
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    delete: true
    fields:
      - { name: title, widget: string }
      - { name: pubDate, widget: datetime }
      - { name: description, widget: string }
      - { name: body, widget: markdown }
